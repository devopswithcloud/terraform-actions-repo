name: Terraform GCP Pipeline 
on: 
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environement to Deploy'
                type: choice
                options:
                    - dev
                    - test
                    - stage
                    - prod
                required: true

            action:
                description: 'Terraform action to perform'
                type: choice
                options: [validate, plan, apply, destroy]
                required: true
permissions: 
    id-token: write
    contents: read
env: 
    GCS_BUCKET: my-second-project-499702-terraform-infra
jobs:
    terraform:
        name: Terraform (${{inputs.action}})
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3
            - name: Authenticate to GCP 
              uses: 'google-github-actions/auth@v3'
              with:
                workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
                service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: 1.12.2

            - name: Terraform Init
              run: |
                terraform init \
                -backend-config="bucket=${GCS_BUCKET}" \
                -backend-config="prefix=${{ github.event.inputs.environment }}"

            - name: Terraform Validate
              if: ${{ github.event.inputs.action == 'validate' }}
              run: terraform validate

            - name: Terraform Plan
              if: ${{ github.event.inputs.action == 'plan' }}
              run: terraform plan -var-file="${{ github.event.inputs.environment }}.tfvars"

            - name: Terraform Apply
              if: ${{ github.event.inputs.action == 'apply' }}
              run: terraform apply -auto-approve -var-file="${{ github.event.inputs.environment }}.tfvars"

            - name: Terraform Destroy
              if: ${{ github.event.inputs.action == 'destroy' }}
              run: terraform destroy -auto-approve -var-file="${{ github.event.inputs.environment }}.tfvars"

              